name: Build Windows EXE

on:
  push:
    tags:
      - "v*"           # trigger เมื่อ push tag เช่น v1.0, v1.1
  workflow_dispatch:   # หรือกด Run manually บน GitHub ก็ได้

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flask pypdf reportlab pandas openpyxl pyinstaller

      - name: Build EXE
        run: pyinstaller ACERT.spec --noconfirm

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ACERT.exe
          name: "ACERT ${{ github.ref_name }}"
          body: "Download ACERT.exe แล้วดับเบิลคลิกได้เลย ไม่ต้องติดตั้งอะไรเพิ่ม"
